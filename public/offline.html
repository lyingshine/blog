<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #f4f7ff, #edf3ff);
        color: #1d1d1f;
        padding: 24px;
      }
      .card {
        width: min(480px, 100%);
        background: #fff;
        border: 1px solid #dbe4ff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 16px 50px rgba(24, 50, 95, 0.12);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #4a4a57;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>Please check your connection and try again.</p>
    </main>
  </body>
</html>
