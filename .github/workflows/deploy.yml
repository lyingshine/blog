name: Deploy To Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Deploy
        run: |
          export PATH=/usr/local/bin:/usr/bin:/bin:$PATH
          git config --global --add safe.directory /opt/blog || true
          /opt/deploy-blog.sh

